name: "✏️ Update an Existing Listing"
description: "Correct or update information for a project already in the directory."
title: "[Update] <Project Name>"
labels: ["update", "pending-review"]
assignees:
  - bajwa82mna

body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Listing
        Use this to report outdated info, wrong descriptions, broken links, or status changes for a project already on [claw4science.campusinchina.com](https://claw4science.campusinchina.com).

  - type: input
    id: project-name
    attributes:
      label: "Project Name"
      placeholder: "e.g. ClawBio"
    validations:
      required: true

  - type: input
    id: github-url
    attributes:
      label: "GitHub Repository URL"
      placeholder: "https://github.com/org/repo"
    validations:
      required: true

  - type: dropdown
    id: update-type
    attributes:
      label: "Type of Update"
      options:
        - "Description is inaccurate or outdated"
        - "Wrong category"
        - "Missing or wrong tags"
        - "Star count significantly outdated"
        - "Project has been renamed or moved"
        - "Project is now archived / abandoned"
        - "New website or paper link"
        - "Status change (Active → Stale, etc.)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: current-info
    attributes:
      label: "Current (Incorrect) Information"
      description: "Paste what the directory currently shows."
    validations:
      required: true

  - type: textarea
    id: correct-info
    attributes:
      label: "Correct / Updated Information"
      description: "What should it say instead?"
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: "Source / Evidence (optional)"
      description: "Link confirming the update — GitHub release notes, repo README, etc."
    validations:
      required: false
